<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPBrew Cluster Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; flex-direction: column; gap: 12px; }
        h1 { font-size: 24px; font-weight: 600; }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-tab {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab:hover { color: var(--text-primary); background: var(--bg-tertiary); }
        .nav-tab.active { background: var(--accent); color: white; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.online { background: var(--success); color: white; }
        .status-badge.offline { background: var(--error); color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .device-list, .job-list { list-style: none; }

        .device-item, .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .device-item:last-child, .job-item:last-child { border-bottom: none; }

        .device-info, .job-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .device-name, .job-name {
            font-family: monospace;
            font-size: 13px;
        }

        .device-item.disabled .device-name {
            color: var(--text-secondary);
        }

        .device-item.disabled {
            opacity: 0.7;
        }

        .device-item.disabled:hover {
            background: var(--bg-tertiary);
            cursor: pointer;
        }

        .device-item.disabled .device-name::after {
            content: " (disabled)";
            font-size: 11px;
            opacity: 0.7;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.available { background: var(--success); }
        .status-dot.busy { background: var(--warning); }
        .status-dot.offline { background: var(--error); }
        .status-dot.disabled { background: var(--text-secondary); }

        .disabled-badge {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .job-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .job-status.pending { background: var(--bg-tertiary); }
        .job-status.running { background: var(--warning); color: white; }
        .job-status.completed { background: var(--success); color: white; }
        .job-status.failed { background: var(--error); color: white; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--bg-tertiary); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: #d32f2f; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-warning { background: var(--warning); color: #1f2937; }
        .btn-warning:hover { background: #d97706; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connecting { animation: pulse 1.5s infinite; }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .camera-card {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 16px;
        }

        .camera-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .camera-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .capture-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .capture-controls input[type="number"] {
            width: 70px;
            padding: 6px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .gallery-section {
            margin-top: 30px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery-item:hover { transform: scale(1.02); }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .gallery-item-info {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--bg-tertiary);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .device-item { cursor: pointer; }
        .device-item:hover { background: var(--bg-tertiary); }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .detail-modal.active { display: flex; }

        .detail-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .detail-title { font-size: 18px; font-weight: 600; }

        .detail-close {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-label { color: var(--text-secondary); font-size: 13px; }
        .detail-value { font-weight: 500; font-size: 14px; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

        .tag {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .tag .remove {
            margin-left: 6px;
            cursor: pointer;
            opacity: 0.7;
        }

        .tag .remove:hover { opacity: 1; }

        .add-tag-form {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .add-tag-form input {
            flex: 1;
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .add-tag-form button {
            padding: 6px 12px;
            font-size: 13px;
        }

        .warning-banner {
            background: var(--warning);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .disabled-banner {
            background: var(--text-secondary);
            color: var(--bg-primary);
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>ESPBrew Cluster</h1>
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="switchTab('dashboard')">Dashboard</button>
                    <button class="nav-tab" onclick="switchTab('cameras')">Cameras</button>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div id="connection-status" class="status-badge offline connecting">Connecting...</div>
                <button class="btn" onclick="refreshData()">Refresh</button>
            </div>
        </header>

        <div id="tab-dashboard" class="tab-content active">
            <div class="grid">
                <div class="card stat-card">
                    <div class="stat-value" id="stat-nodes">-</div>
                    <div class="stat-label">Nodes</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-devices">-</div>
                    <div class="stat-label">Devices</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-cameras">-</div>
                    <div class="stat-label">Cameras</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-jobs">-</div>
                    <div class="stat-label">Jobs</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-queued">-</div>
                    <div class="stat-label">Queued</div>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-title">Devices</div>
                    <ul class="device-list" id="device-list">
                        <li class="empty-state">Loading devices...</li>
                    </ul>
                </div>

                <div class="card">
                    <div class="card-title">Jobs</div>
                    <ul class="job-list" id="job-list">
                        <li class="empty-state">Loading jobs...</li>
                    </ul>
                </div>

                <div class="card">
                    <div class="card-title">Create Job</div>
                    <form id="job-form" onsubmit="createJob(event)">
                        <div class="form-group">
                            <label>Firmware File</label>
                            <input type="text" id="firmware" placeholder="/path/to/firmware.bin" required>
                        </div>
                        <div class="form-group">
                            <label>Target Device</label>
                            <select id="device" required>
                                <option value="">Select device...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn" style="width: 100%">Flash Device</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="tab-cameras" class="tab-content">
            <div class="card" style="margin-bottom: 20px;">
                <div class="card-title">Available Cameras</div>
                <div id="camera-list" class="camera-grid">
                    <div class="empty-state">Loading cameras...</div>
                </div>
            </div>

            <div class="gallery-section">
                <div class="gallery-header">
                    <div class="card-title">Capture Gallery</div>
                    <button class="btn btn-secondary" onclick="loadGallery()">Refresh Gallery</button>
                </div>
                <div id="gallery-grid" class="gallery-grid">
                    <div class="empty-state">No captures yet. Take a photo above!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="image-modal" class="modal" onclick="closeModal(event)">
        <button class="modal-close" onclick="closeModal(event)">&times;</button>
        <div class="modal-content">
            <img id="modal-image" src="" alt="Full size capture">
        </div>
    </div>

    <div id="device-modal" class="detail-modal">
        <div class="detail-content">
            <div class="detail-header">
                <div class="detail-title">Device Details</div>
                <button class="detail-close" onclick="closeDeviceModal()">&times;</button>
            </div>
            <div id="device-detail-content">
                <div style="text-align: center; padding: 20px;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let reconnectInterval;
        let cameras = [];

        let reconnectTimeout;

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/api/v1/ws');

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateConnectionStatus(true);
                if (reconnectTimeout) {
                    clearTimeout(reconnectTimeout);
                    reconnectTimeout = null;
                }
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleUpdate(data);
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateConnectionStatus(false);
                // Use timeout instead of interval to prevent multiple concurrent reconnections
                if (!reconnectTimeout) {
                    reconnectTimeout = setTimeout(() => {
                        reconnectTimeout = null;
                        connect();
                    }, 3000);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function updateConnectionStatus(connected) {
            const badge = document.getElementById('connection-status');
            if (connected) {
                badge.className = 'status-badge online';
                badge.textContent = 'Connected';
            } else {
                badge.className = 'status-badge offline connecting';
                badge.textContent = 'Connecting...';
            }
        }

        function handleUpdate(data) {
            if (data.type === 'state' || data.type === 'state_update') {
                document.getElementById('stat-nodes').textContent = data.nodes;
                document.getElementById('stat-devices').textContent = data.devices;
                document.getElementById('stat-cameras').textContent = data.cameras || 0;
                document.getElementById('stat-jobs').textContent = data.jobs;
                document.getElementById('stat-queued').textContent = data.queue_size || 0;
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');

            if (tabName === 'cameras') {
                loadCameras();
                loadGallery();
            }
        }

        async function refreshData() {
            try {
                const [devices, jobs] = await Promise.all([
                    fetch('/api/v1/devices').then(r => r.json()),
                    fetch('/api/v1/jobs').then(r => r.json())
                ]);

                renderDevices(devices);
                renderJobs(jobs);
            } catch (error) {
                console.error('Failed to refresh:', error);
            }
            setTimeout(refreshData, 5000);
        }

        function renderDevices(devices) {
            const list = document.getElementById('device-list');
            const select = document.getElementById('device');

            if (devices.length === 0) {
                list.innerHTML = '<li class="empty-state">No devices found</li>';
                select.innerHTML = '<option value="">No devices</option>';
                return;
            }

            list.innerHTML = devices.map(d => {
                // Show warning indicator if device is not probed
                const needsProbe = !d.device_id && !d.chip_type;
                const isDisabled = d.disabled || d.status === 'disabled';
                return `
                <li class="device-item ${isDisabled ? 'disabled' : ''}" onclick="showDeviceDetail('${d.path}', '${d.device_id || ''}', '${d.chip_type || ''}')" title="${isDisabled ? 'Click to enable device' : 'Click for details'}">
                    <div class="device-info">
                        <span class="status-dot ${isDisabled ? 'disabled' : d.status}"></span>
                        <span class="device-name">${d.path}</span>
                        ${needsProbe ? '<span style="color: var(--warning); margin-left: 8px;" title="Device not probed">⚠</span>' : ''}
                        ${isDisabled ? '<span class="disabled-badge">DISABLED</span>' : ''}
                    </div>
                    <span style="font-size: 12px; color: var(--text-secondary)">
                        ${d.chip_type || 'Unknown chip'}
                    </span>
                </li>
            `}).join('');

            select.innerHTML = '<option value="">Select device...</option>' +
                devices.filter(d => d.status === 'available' && !d.disabled).map(d =>
                    `<option value="${d.path}">${d.path}</option>`
                ).join('');
        }

        function renderJobs(jobs) {
            const list = document.getElementById('job-list');

            if (jobs.length === 0) {
                list.innerHTML = '<li class="empty-state">No jobs</li>';
                return;
            }

            list.innerHTML = jobs.map(j => `
                <li class="job-item">
                    <div class="job-info">
                        <span class="job-name">${j.id.slice(0, 8)}</span>
                    </div>
                    <div style="flex: 1; margin: 0 16px;">
                        ${j.status === 'running' ? `
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${j.progress}%"></div>
                            </div>
                        ` : ''}
                    </div>
                    <span class="job-status ${j.status}">${j.status}</span>
                </li>
            `).join('');
        }

        async function createJob(event) {
            event.preventDefault();

            const firmware = document.getElementById('firmware').value;
            const device = document.getElementById('device').value;

            try {
                const response = await fetch('/api/v1/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firmware, device_path: device })
                });

                if (response.ok) {
                    document.getElementById('job-form').reset();
                    refreshData();
                } else {
                    const error = await response.json();
                    alert('Failed to create job: ' + error.error);
                }
            } catch (error) {
                alert('Failed to create job: ' + error.message);
            }
        }

        async function loadCameras() {
            try {
                const response = await fetch('/api/v1/cameras');
                const data = await response.json();
                cameras = data.cameras || [];

                renderCameras(cameras);
            } catch (error) {
                console.error('Failed to load cameras:', error);
                document.getElementById('camera-list').innerHTML =
                    '<div class="empty-state">Failed to load cameras</div>';
            }
        }

        function renderCameras(cameras) {
            const list = document.getElementById('camera-list');

            if (cameras.length === 0) {
                list.innerHTML = '<div class="empty-state">No cameras found</div>';
                return;
            }

            list.innerHTML = cameras.map(cam => `
                <div class="camera-card">
                    <div class="camera-name">${cam.name || cam.id}</div>
                    <div class="camera-info">
                        ${cam.backend} • ${cam.node_id || 'local'} • ${cam.status}
                    </div>
                    <div class="capture-controls">
                        <button class="btn" onclick="capture('${cam.id}')">Capture</button>
                        <input type="number" id="width-${cam.id}" placeholder="W" value="1280" min="320" max="3840">
                        <input type="number" id="height-${cam.id}" placeholder="H" value="720" min="240" max="2160">
                    </div>
                </div>
            `).join('');
        }

        async function capture(cameraId) {
            const width = parseInt(document.getElementById(`width-${cameraId}`).value) || 1280;
            const height = parseInt(document.getElementById(`height-${cameraId}`).value) || 720;

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Capturing...';

            try {
                const response = await fetch('/api/v1/cameras/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ camera_id: cameraId, width, height, format: 'jpg', quality: 85 })
                });

                    const result = await response.json();
                    setTimeout(() => {

        async function loadGallery() {
            try {
                const response = await fetch('/api/v1/captures');

                console.error('Failed to load gallery:', error);

        function renderGallery(captures) {
            const grid = document.getElementById('gallery-grid');

            if (captures.length === 0) {
                grid.innerHTML = '<div class="empty-state">No captures yet</div>';
                return;
            }

            grid.innerHTML = captures.map(cap => `
                <div class="gallery-item">
                    <img src="${cap.path}" alt="${cap.filename}" loading="lazy" onclick="openModal('${cap.path}')">
                    <div class="gallery-item-info">
                        <div>${cap.camera_name || cap.camera_id}</div>
                        <div>${new Date(cap.timestamp * 1000).toLocaleString()}</div>
                        <button class="btn btn-danger" onclick="deleteCapture(event, '${cap.path}')" style="margin-top: 8px; padding: 4px 12px; font-size: 12px;">Delete</button>

        async function deleteCapture(event, path) {
            event.stopPropagation();

            if (!confirm('Delete this capture?')) {
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Deleting...';

            try {
                const response = await fetch(path, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadGallery();
                } else {
                    const error = await response.json();
                    alert('Failed to delete: ' + (error.error || 'Unknown error'));
                    btn.disabled = false;
                    btn.textContent = 'Delete';
                }
            } catch (error) {
                console.error('Failed to delete capture:', error);
                alert('Failed to delete: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Delete';
            }
        }

        let currentDevicePath = null;

        // Extract chip type from Wokwi device path (e.g., "wokwi-esp32s3" -> "ESP32-S3")
        function wokwiChipType(path) {
            const match = path.match(/^wokwi-(esp32[cs][236]|esp32)$/);
            if (!match) return null;
            const chip = match[1];
            switch (chip) {
                case 'esp32s3': return 'ESP32-S3';
                case 'esp32s2': return 'ESP32-S2';
                case 'esp32c3': return 'ESP32-C3';
                case 'esp32c6': return 'ESP32-C6';
                case 'esp32h2': return 'ESP32-H2';
                case 'esp32': return 'ESP32';
                default: return null;
            }
        }

            document.getElementById('device-modal').classList.add('active');
            currentDevicePath = path;

            const content = document.getElementById('device-detail-content');

            // If no deviceId, show edit form with probe option
            if (!deviceId) {
                // For Wokwi devices, extract chip type from path
                const inferredChip = chipType || wokwiChipType(path);
                renderDeviceEditForm(path, inferredChip);
                return;
            }

            try {
                const response = await fetch(`/api/v1/devices/${deviceId}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch device details');
                }

                const dev = await response.json();
                currentDeviceId = dev.device_id;
                currentDevicePath = dev.current_path || path;
                renderDeviceDetail(dev);
            } catch (error) {
                console.error('Failed to load device details:', error);
                content.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--error);">Failed to load device details</div>';
            }
        }

                if (!bytes) return '-';
                const units = ['B', 'KB', 'MB', 'GB'];

                }

                <div class="detail-row">
                    <span class="detail-label">PSRAM Size</span>
                    <span class="detail-value">${formatBytes(dev.psram_size)}${dev.psram_type ? ` (${dev.psram_type})` : ''}</span>

                        chip_rev: chipRev,
                        flash_size: flashSize,
                        psram_size: psramSize,
                        psram_type: psramType,
                        board_model: boardModel,
                        description: description,
                    })
                });

                if (response.ok) {
                    const dev = await (await fetch(`/api/v1/devices/${currentDeviceId}`)).json();
                    currentDeviceData = dev;
                    renderDeviceDetail(dev);
                    refreshData();
                } else {
                    const error = await response.json();
                    content.innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <p style="color: var(--error); margin-bottom: 16px;">Failed to update: ${error.error || 'Unknown error'}</p>
                            <button class="btn" onclick="showDeviceEditForm()">Try Again</button>
                        </div>
                    `;
                }
            } catch (error) {
                content.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: var(--error); margin-bottom: 16px;">Failed to update: ${error.message}</p>
                        <button class="btn" onclick="showDeviceEditForm()">Try Again</button>
                    </div>
                `;
            }
        }

        function closeDeviceModal() {
            document.getElementById('device-modal').classList.remove('active');
            currentDeviceId = null;
            currentDeviceData = null;
        }

        function closeDeviceModal() {
            document.getElementById('device-modal').classList.remove('active');
            currentDeviceId = null;
        }

        async function addTag() {
            const input = document.getElementById('new-tag');
            const tag = input.value.trim();

            if (!tag || !currentDeviceId) return;

            const content = document.getElementById('device-detail-content');
            const dev = await (await fetch(`/api/v1/devices/${currentDeviceId}`)).json();
            const currentTags = dev.tags || [];

            if (currentTags.includes(tag)) {
                alert('Tag already exists');
                return;
            }

            const newTags = [...currentTags, tag];

            try {
                const response = await fetch(`/api/v1/devices/${currentDeviceId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tags: newTags })
                });

                if (response.ok) {
                    input.value = '';
                    // Refresh device details
                    showDeviceDetail('', currentDeviceId);
                } else {
                    alert('Failed to add tag');
                }
            } catch (error) {
                console.error('Failed to add tag:', error);
                alert('Failed to add tag: ' + error.message);
            }
        }

        async function removeTag(tag) {
            if (!currentDeviceId) return;

            const content = document.getElementById('device-detail-content');
            const dev = await (await fetch(`/api/v1/devices/${currentDeviceId}`)).json();
            const newTags = (dev.tags || []).filter(t => t !== tag);

            try {
                const response = await fetch(`/api/v1/devices/${currentDeviceId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tags: newTags })
                });

                if (response.ok) {
                    showDeviceDetail('', currentDeviceId);
                } else {
                    alert('Failed to remove tag');
                }
            } catch (error) {
                console.error('Failed to remove tag:', error);
                alert('Failed to remove tag: ' + error.message);
            }
        }

        async function eraseDevice() {
            if (!currentDeviceId) {
                alert('No device selected');
                return;
            }

            const dev = currentDeviceData;
            const path = dev && (dev.last_path || dev.current_path);
            if (!path) {
                alert('Device has no known path. Cannot erase.');
                return;
            }

            const confirmMsg = dev && dev.device_id
                ? `Erase entire flash on ${dev.device_id} (${path})?\n\nThis will permanently delete all firmware on the device. This action cannot be undone.`
                : `Erase entire flash on ${path}?\n\nThis will permanently delete all firmware on the device. This action cannot be undone.`;

            if (!confirm(confirmMsg)) {
                return;
            }

            const content = document.getElementById('device-detail-content');
            content.innerHTML = '<div style="text-align: center; padding: 30px;"><span class="spinner"></span> Erasing flash...</div>';

            try {
                const response = await fetch('/api/v1/flash/erase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_path: path,
                        erase_all: true,
                        client_id: 'web-dashboard'
                    })
                });

                if (response.ok) {
                    const result = await response.json();

                    // Show progress
                    content.innerHTML = `
                        <div style="text-align: center; padding: 30px;">
                            <p style="margin-bottom: 16px;">Erasing flash... Job ID: ${result.job_id}</p>
                            <div style="width: 100%; max-width: 300px; margin: 0 auto; background: var(--bg-secondary); border-radius: 4px; height: 8px; overflow: hidden;">
                                <div id="erase-progress" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
                            </div>
                            <p id="erase-status" style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">Starting...</p>
                        </div>
                    `;

                    // Connect to progress WebSocket
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const ws = new WebSocket(`${protocol}//${window.location.host}/api/v1/flash/${result.job_id}/progress`);

                    ws.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        const progressBar = document.getElementById('erase-progress');
                        const statusText = document.getElementById('erase-status');

                        if (progressBar && msg.progress !== undefined) {
                            progressBar.style.width = msg.progress + '%';
                        }
                        if (statusText && msg.status) {
                            statusText.textContent = msg.status;
                        }

                        if (msg.type === 'complete') {
                            ws.close();
                            if (msg.status === 'completed') {
                                content.innerHTML = `
                                    <div style="text-align: center; padding: 30px;">
                                        <p style="color: var(--success); margin-bottom: 16px;">Flash erased successfully!</p>
                                        <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Close</button>
                                    </div>
                                `;
                            } else {
                                content.innerHTML = `
                                    <div style="text-align: center; padding: 30px;">
                                        <p style="color: var(--error); margin-bottom: 16px;">Erase failed: ${msg.error || 'Unknown error'}</p>
                                        <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Try Again</button>
                                    </div>
                                `;
                            }
                        }
                    };

                    ws.onerror = () => {
                        ws.close();
                        content.innerHTML = `
                            <div style="text-align: center; padding: 30px;">
                                <p style="color: var(--error); margin-bottom: 16px;">Failed to connect to progress stream</p>
                                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 16px;">Job ID: ${result.job_id}</p>
                                <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Close</button>
                            </div>
                        `;
                    };

                } else {
                    const error = await response.json();
                    content.innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <p style="color: var(--error); margin-bottom: 16px;">Failed to start erase: ${error.error || 'Unknown error'}</p>
                            <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Try Again</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to erase flash:', error);
                content.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: var(--error); margin-bottom: 16px;">Failed to erase: ${error.message}</p>
                        <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Try Again</button>
                    </div>
                `;
            }
        }

        async function deleteDevice() {
            if (!currentDeviceId) {
                alert('No device selected');
                return;
            }

            const dev = currentDeviceData;
            const confirmMsg = dev && dev.device_id
                ? `Delete device ${dev.device_id} from inventory?\n\nThis will remove the device record but will not affect the physical device.`
                : 'Delete this device from inventory?';

            if (!confirm(confirmMsg)) {
                return;
            }

            const content = document.getElementById('device-detail-content');
            content.innerHTML = '<div style="text-align: center; padding: 30px;"><span class="spinner"></span> Deleting device...</div>';

            try {
                const response = await fetch(`/api/v1/devices/${currentDeviceId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    closeDeviceModal();
                    refreshData();
                } else {
                    const error = await response.json();
                    content.innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <p style="color: var(--error); margin-bottom: 16px;">Failed to delete: ${error.error || 'Unknown error'}</p>
                            <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Try Again</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to delete device:', error);
                content.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: var(--error); margin-bottom: 16px;">Failed to delete: ${error.message}</p>
                        <button class="btn" onclick="showDeviceDetail('', '${currentDeviceId}')">Try Again</button>
                    </div>
                `;
            }
        }

        connect();
        refreshData();
    </script>
</body>
</html>
